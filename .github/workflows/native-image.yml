name: Build native image

on:
  release:
    types: [ published ]
  workflow_dispatch:


jobs:
  build-admin-cli:
    name: Build a native image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          cache: 'maven'
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Ensure to use tagged version
        if: startsWith(github.ref, 'refs/tags/')
        run: mvn versions:set -DnewVersion=${GITHUB_REF##*/}
      - name: Build develop native image
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        working-directory: admin-cli
        run: >
          mvn -B clean package -Pnative
      - name: Build release native image
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: admin-cli
        run: >
          mvn -B clean package -Pnative,release
      - name: Upload executable
        uses: actions/upload-artifact@v6
        with:
          name: katta-cli
          path: |
            admin-cli/target/katta
          if-no-files-found: error
      - name: Publish executable on Github Releases
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          token: ${{ secrets.CRYPTOBOT_RELEASE_TOKEN }}
          files: |
            admin-cli/target/katta
