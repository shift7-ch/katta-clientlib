name: Build Admin CLI Native Image

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

jobs:
  cli:
    name: Build native image for ${{ matrix.os }}
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest ]
    steps:
      - uses: actions/checkout@v6
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          cache: 'maven'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'
      - name: Install musl tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update && sudo apt-get install -y musl-dev musl-tools
          # Build and install zlib for musl (libz-dev only provides glibc-linked libz.a,
          # which is not found by the musl linker during --static --libc=musl native image builds)
          cd /tmp
          curl -fsSL https://github.com/madler/zlib/releases/download/v1.3.1/zlib-1.3.1.tar.gz -o zlib-1.3.1.tar.gz
          echo "9a93b2b7dfdac77ceba5a558a580e74667dd6fede4585b91eefb60f03b72df23  zlib-1.3.1.tar.gz" | sha256sum -c
          tar xzf zlib-1.3.1.tar.gz
          cd zlib-1.3.1
          CC=x86_64-linux-musl-gcc ./configure --static --prefix=/usr/local
          make -j$(nproc)
          sudo cp libz.a /usr/lib/x86_64-linux-musl/
      - name: Ensure to use tagged version
        if: startsWith(github.ref, 'refs/tags/')
        run: mvn versions:set -DnewVersion=${GITHUB_REF##*/}
      - name: Build native image
        run: >
          mvn --batch-mode clean package -pl admin-cli -am -Pnative -DskipTests -DskipITs
      - name: Upload executable
        uses: actions/upload-artifact@v7
        with:
          name: katta-cli-${{ matrix.os }}
          path: |
            admin-cli/target/katta
          if-no-files-found: error
      - name: Publish executable on Github Releases
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          fail_on_unmatched_files: true
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: |
            admin-cli/target/katta
